<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>你好，LangChain！构建第一个对话机器人</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <div class="logo-section">
                    <div class="logo-icon">🤖</div>
                    <div class="logo-text">
                        <h1>LangChain 聊天机器人</h1>
                        <p class="subtitle">基于 LangChain 的智能对话体验</p>
                    </div>
                </div>
                <div class="header-actions">
                    <button id="clearHistory" class="btn btn-secondary" title="清空对话历史">
                        <span>🗑️</span> 清空
                    </button>
                    <button id="toggleTheme" class="btn btn-icon" title="切换主题">
                        <span id="themeIcon">🌙</span>
                    </button>
                </div>
            </div>
            <div class="status-bar">
                <span class="status-indicator"></span>
                <span id="connectionStatus">准备就绪</span>
                <span class="message-count">对话数: <span id="msgCount">0</span></span>
            </div>
        </header>

        <main class="chat-container">
            <div class="welcome-screen" id="welcomeScreen">
                <div class="welcome-content">
                    <div class="welcome-icon">🚀</div>
                    <h2>欢迎使用 LangChain 对话机器人</h2>
                    <p>这是一个演示应用，展示如何使用 LangChain 概念构建智能对话界面</p>
                    <div class="feature-grid">
                        <div class="feature-item">
                            <span class="feature-icon">💬</span>
                            <span>对话模板</span>
                        </div>
                        <div class="feature-item">
                            <span class="feature-icon">🔗</span>
                            <span>链式调用</span>
                        </div>
                        <div class="feature-item">
                            <span class="feature-icon">📝</span>
                            <span>历史管理</span>
                        </div>
                        <div class="feature-item">
                            <span class="feature-icon">🧠</span>
                            <span>上下文理解</span>
                        </div>
                    </div>
                    <button class="btn btn-primary start-chat-btn" id="startChatBtn">
                        开始对话
                    </button>
                </div>
            </div>

            <div class="chat-messages" id="chatMessages">
                <!-- Messages will be dynamically inserted here -->
            </div>

            <div class="typing-indicator" id="typingIndicator">
                <div class="typing-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
                <span class="typing-text">AI 正在思考...</span>
            </div>
        </main>

        <footer class="input-container">
            <div class="input-wrapper">
                <div class="input-tools">
                    <button class="tool-btn" title="表情包">😊</button>
                    <button class="tool-btn" title="代码块">&lt;/&gt;</button>
                    <button class="tool-btn" title="快捷模板">📋</button>
                </div>
                <div class="input-field-container">
                    <textarea 
                        id="messageInput" 
                        class="message-input" 
                        placeholder="输入你的问题... (Shift+Enter 换行)"
                        rows="1"
                    ></textarea>
                    <div class="input-stats">
                        <span id="charCount">0</span> / 2000
                    </div>
                </div>
                <button id="sendBtn" class="send-btn" disabled>
                    <span class="send-icon">➤</span>
                    <span class="send-text">发送</span>
                </button>
            </div>
            <div class="input-hints">
                <span class="hint">💡 输入 "帮助" 查看可用命令</span>
                <span class="hint">📌 支持多轮对话上下文</span>
            </div>
        </footer>

        <aside class="history-panel" id="historyPanel">
            <div class="history-header">
                <h3>📚 对话历史</h3>
                <button class="close-panel-btn" id="closeHistoryPanel">×</button>
            </div>
            <div class="history-list" id="historyList">
                <!-- History items will be inserted here -->
            </div>
        </aside>

        <div class="quick-commands" id="quickCommands">
            <button class="quick-cmd" data-prompt="介绍一下LangChain">📚 LangChain简介</button>
            <button class="quick-cmd" data-prompt="如何开始使用？">🚀 快速开始</button>
            <button class="quick-cmd" data-prompt="有哪些核心组件？">🔧 核心组件</button>
            <button class="quick-cmd" data-prompt="给个代码示例">💻 代码示例</button>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="app.js"></script>
</body>
</html>
